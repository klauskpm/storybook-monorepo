name: Publish angular-storybook to Chromatic
on:
  push:
    branches:
      - main
    # 👇 Filter paths for the specific project
    paths:
      - 'apps/angular-storybook/**'

jobs:
  publish-to-chromatic:
    uses: ./.github/workflows/_reusable.publish-to-chromatic.yml
    with:
      # 👇 Working directory for the specific project
      workingDir: 'apps/angular-storybook'
    secrets:
      # 👇 Chromatic projectToken for the specific project
      chromaticProjectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_ANGULAR_STORYBOOK }}
      githubToken: ${{ secrets.GITHUB_TOKEN }}