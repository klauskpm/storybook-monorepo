name: Publish react-storybook to Chromatic
on:
  push:
    branches:
      - main
    # 👇 Filter paths for the specific project
    paths:
      - 'apps/react-storybook/**'

jobs:
  publish-to-chromatic:
    uses: ./.github/workflows/_reusable.publish-to-chromatic.yml
    with:
      workingDir: 'apps/react-storybook'
    secrets:
      chromaticProjectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_REACT_STORYBOOK }}
      githubToken: ${{ secrets.GITHUB_TOKEN }}
